<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback - AI Mood Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/feedback.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<!-- Navbar -->
<header class="navbar">
    <div class="nav-links">
        <a href="{{ url_for('main.home') }}">Home</a>
        <a href="{{ url_for('main.contact') }}">Contact Us</a>
        <a href="{{ url_for('main.register') }}">Register</a>
    </div>
</header>

<!-- Feedback Form Section -->
<div class="feedback-container">
    <h2>We Value Your Feedback</h2>
    <p>Please let us know your thoughts and suggestions to help us improve!</p>

    <form method="POST" action="{{ url_for('main.submit_feedback') }}">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your full name" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Your email address" required>
        </div>

        <div class="form-group">
            <label for="rating">Rating (1 = Poor, 5 = Excellent)</label>
            <select id="rating" name="rating" required>
                <option value="">-- Select a rating --</option>
                <option value="1">★☆☆☆☆</option>
                <option value="2">★★☆☆☆</option>
                <option value="3">★★★☆☆</option>
                <option value="4">★★★★☆</option>
                <option value="5">★★★★★</option>
            </select>
        </div>

        <div class="form-group">
            <label for="message">Your Feedback</label>
            <textarea id="message" name="message" rows="5" placeholder="Share your thoughts..." required></textarea>
        </div>

        <button type="submit">Submit Feedback</button>
    </form>
</div>

</body>
</html>
